name: Generate Proto

on:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate
        run: |
          mkdir -p out/payment out/order
          protoc --go_out=out --go_opt=paths=source_relative \
                 --go-grpc_out=out --go-grpc_opt=paths=source_relative \
                 payment/payment.proto order/order.proto

      - name: Push to generated repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.GH_PAT }}
        with:
          source_file: 'out/.'
          destination_repo: 'ekosik7/ap2-generated'
          destination_branch: 'main'
          user_email: 'actions@github.com'
          user_name: 'GitHub Actions'
